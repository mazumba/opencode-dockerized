services:
  opencode:
    container_name: opencode
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        USER_UID: ${USER_UID:?USER_UID is not set. Run via 'make opencode-build'}
        USER_GID: ${USER_GID:?USER_GID is not set. Run via 'make opencode-build'}
        OPENCODE_VERSION: 1.4.3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.opencode/config:/home/opencode/.config/opencode
      - opencode_share:/home/opencode/.local/share/opencode
    environment:
      OPENCODE_DISABLE_AUTOUPDATE: true
    ports:
      - "4096:4096"

volumes:
  opencode_share:
